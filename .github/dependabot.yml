version: 2
updates:
  # Dev dependencies (the library itself has zero runtime deps).
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns:
          - '*'
    commit-message:
      prefix: 'chore(deps)'

  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore(ci)'
