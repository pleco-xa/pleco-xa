name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Test (vitest)
        run: npm run test

      - name: Build library
        run: npm run build:lib

      - name: Node import smoke (catches top-level DOM access)
        run: node --input-type=module -e "import('./packages/pleco-xa/dist/pleco-xa.js').then(m => console.log('exports:', Object.keys(m).length))"

      - name: Build demo (consumer e2e)
        run: npm run build -w @pleco-xa/demo

      - name: Build docs site (Starlight + TypeDoc API reference)
        run: npm run build -w @pleco-xa/docs
