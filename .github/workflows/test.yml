name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Test (vitest)
        run: npm run test

      - name: Build library
        run: npm run build:lib

      - name: Node import smoke (catches top-level DOM access)
        run: node --input-type=module -e "import('./packages/pleco-xa/dist/pleco-xa.js').then(m => console.log('exports:', Object.keys(m).length))"

      - name: Build demo (consumer e2e)
        run: npm run build -w @pleco-xa/demo

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/demo/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v2
