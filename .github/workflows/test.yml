name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Install Jest as a dev dependency (if not already in package.json)
      - run: npm install --save-dev jest

      # Run Jest tests with coverage
      - name: Run Jest with coverage
        run: npx jest --coverage

      # Upload Jest coverage folder
      - name: Upload Jest coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: coverage/

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v2
