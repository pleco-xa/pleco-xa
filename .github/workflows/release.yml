name: Release

# Publishes packages/pleco-xa to npm when a GitHub Release is published.
#
# One-time setup (pick ONE auth method):
#   A) Trusted publishing (recommended, no secret): on npmjs.com ->
#      pleco-xa -> Settings -> Trusted Publisher -> GitHub Actions, repo
#      `pleco-xa/pleco-xa`, workflow `release.yml`. Then remove the
#      NODE_AUTH_TOKEN line below.
#   B) Automation token: npmjs.com -> Access Tokens -> Generate -> "Automation"
#      (bypasses 2FA) -> add it as the repo secret `NPM_TOKEN`.
#
# Both paths produce a signed provenance attestation (requires id-token: write).
#
# Release flow: bump packages/pleco-xa/package.json + CHANGELOG.md -> tag
# `vX.Y.Z` -> publish a GitHub Release for that tag -> this runs.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance / OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      # GITHUB_REF_NAME is a trusted runner-provided env var (the tag name).
      # Used only in a quoted comparison, never eval'd — no injection surface.
      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG=$(node -p "require('./packages/pleco-xa/package.json').version")
          TAG="${REF_NAME#v}"
          echo "package.json: $PKG   tag: $TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match release tag ($TAG)"
            exit 1
          fi

      - run: npm run lint
      - run: npm test
      - run: npm run build:lib

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: packages/pleco-xa
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
