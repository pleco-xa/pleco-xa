<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pleco-Audio Demo: Utilities</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 1.1em;
    }

    .module-section {
      margin-bottom: 40px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .module-section h2 {
      color: #764ba2;
      margin-bottom: 15px;
      font-size: 1.5em;
    }

    .function-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    .function-item {
      background: white;
      padding: 12px 16px;
      border-radius: 6px;
      border-left: 3px solid #667eea;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.9em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .function-item:hover {
      transform: translateX(5px);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    #demo-output {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.9em;
      line-height: 1.6;
      min-height: 200px;
      margin-top: 20px;
      overflow-x: auto;
    }

    .demo-controls {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.2s;
    }

    button:hover {
      background: #764ba2;
    }

    button:active {
      transform: scale(0.98);
    }

    #file-input {
      display: none;
    }

    .file-label {
      background: #28a745;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      display: inline-block;
      transition: background 0.2s;
    }

    .file-label:hover {
      background: #218838;
    }

    canvas {
      width: 100%;
      height: 200px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-top: 20px;
    }

    .status {
      padding: 10px 16px;
      background: #e7f3ff;
      border-left: 3px solid #2196F3;
      border-radius: 4px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Utilities</h1>
    <p class="subtitle">Interactive demos for Utilities functions</p>

    <div class="demo-controls">
      <label class="file-label" for="file-input">Load Audio File</label>
      <input type="file" id="file-input" accept="audio/*">
      <button id="run-demo">Run Demo</button>
      <button id="clear-output">Clear Output</button>
    </div>

    
    <div class="module-section">
      <h2>xa-util</h2>
      <div class="function-list" id="xa-util-functions">
        <!-- Functions will be populated here -->
      </div>
    </div>
    

    <div class="module-section">
      <h2>xa-normalize</h2>
      <div class="function-list" id="xa-normalize-functions">
        <!-- Functions will be populated here -->
      </div>
    </div>
    

    <div class="module-section">
      <h2>xa-cache</h2>
      <div class="function-list" id="xa-cache-functions">
        <!-- Functions will be populated here -->
      </div>
    </div>
    

    <div class="module-section">
      <h2>xa-advanced</h2>
      <div class="function-list" id="xa-advanced-functions">
        <!-- Functions will be populated here -->
      </div>
    </div>
    

    <div id="demo-output">
      <div style="color: #4EC9B0;">// Demo output will appear here</div>
      <div style="color: #6A9955;">// Click on any function to test it</div>
      <div style="color: #6A9955;">// Load an audio file to enable audio processing functions</div>
    </div>

    <canvas id="visualization-canvas"></canvas>

    <div class="status" id="status">
      Ready. Load an audio file to begin.
    </div>
  </div>

  <script type="module">
    // Demo script will be generated here
    const output = document.getElementById('demo-output');
    const status = document.getElementById('status');
    const canvas = document.getElementById('visualization-canvas');

    let audioBuffer = null;
    let audioContext = null;

    function log(message, color = '#d4d4d4') {
      const line = document.createElement('div');
      line.style.color = color;
      line.textContent = message;
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }

    function clearOutput() {
      output.innerHTML = '';
    }

    document.getElementById('clear-output').addEventListener('click', clearOutput);

    document.getElementById('file-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      status.textContent = 'Loading audio file...';

      try {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        const arrayBuffer = await file.arrayBuffer();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

        log('Audio loaded successfully:', '#4EC9B0');
        log(`  Duration: ${audioBuffer.duration.toFixed(2)}s`, '#CE9178');
        log(`  Sample Rate: ${audioBuffer.sampleRate}Hz`, '#CE9178');
        log(`  Channels: ${audioBuffer.numberOfChannels}`, '#CE9178');

        status.textContent = `Audio loaded: ${file.name} (${audioBuffer.duration.toFixed(2)}s)`;
      } catch (error) {
        log('Error loading audio: ' + error.message, '#f48771');
        status.textContent = 'Error loading audio file';
      }
    });

    document.getElementById('run-demo').addEventListener('click', () => {
      clearOutput();
      log('Running Utilities demo...', '#4EC9B0');
      log('This is a basic demo - implement specific function tests', '#6A9955');

      if (audioBuffer) {
        log('Audio buffer available for processing', '#4EC9B0');
        // Add actual demo code here
      } else {
        log('No audio loaded - load a file first', '#f48771');
      }
    });
  </script>
</body>
</html>
